<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>สแกนบาร์โค้ดยา — PCU สะบ้าย้อย</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060D18;
  --surface: #0E1829;
  --surface2: #162236;
  --card: #1A2B42;
  --border: rgba(255,255,255,.07);
  --border2: rgba(255,255,255,.14);
  --blue: #3D9EFF;
  --blue-glow: rgba(61,158,255,.35);
  --teal: #00E5C4;
  --teal-glow: rgba(0,229,196,.3);
  --green: #22D47A;
  --green-glow: rgba(34,212,122,.3);
  --amber: #FFB830;
  --red: #FF5A5A;
  --text1: #EEF2FF;
  --text2: #8BA3C4;
  --text3: #3D5470;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans Thai', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text1);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
}

/* ─── SCREEN SYSTEM ─── */
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* ─── HOME SCREEN ─── */
#home {
  align-items: center; justify-content: center;
  padding: calc(env(safe-area-inset-top) + 2rem) 1.5rem calc(env(safe-area-inset-bottom) + 2rem);
  position: relative; overflow: hidden;
  animation: screenIn .4s cubic-bezier(.34,1.2,.64,1);
}
@keyframes screenIn { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }

/* Ambient background orbs */
#home::before {
  content: ''; position: absolute; width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(61,158,255,.12) 0%, transparent 70%);
  top: -100px; left: -100px; pointer-events: none;
}
#home::after {
  content: ''; position: absolute; width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(0,229,196,.08) 0%, transparent 70%);
  bottom: 0; right: -80px; pointer-events: none;
}

.home-logo {
  width: 96px; height: 96px; border-radius: 28px;
  background: linear-gradient(145deg, #1A3A5C, #0E2440);
  border: 1px solid rgba(61,158,255,.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 44px; margin-bottom: 1.5rem;
  box-shadow: 0 0 0 1px rgba(61,158,255,.1), 0 20px 60px rgba(0,0,0,.4);
  animation: logoPop .6s cubic-bezier(.34,1.6,.64,1) .1s both;
}
@keyframes logoPop { from { transform: scale(.5); opacity: 0; } to { transform: none; opacity: 1; } }

.home-title {
  font-size: 26px; font-weight: 700; text-align: center;
  letter-spacing: -.5px; line-height: 1.2; margin-bottom: .5rem;
  animation: fadeUp .4s ease .2s both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
.home-sub {
  font-size: 13px; color: var(--text2); text-align: center;
  margin-bottom: 2.5rem; line-height: 1.6;
  animation: fadeUp .4s ease .3s both;
}

.scan-btn-big {
  width: 100%; max-width: 320px;
  padding: 18px 24px; border-radius: 20px; border: none;
  background: linear-gradient(135deg, var(--blue), #1A7FE8);
  color: #fff; font-size: 17px; font-weight: 700;
  font-family: var(--sans); cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 12px;
  box-shadow: 0 0 0 1px rgba(61,158,255,.3), 0 8px 32px rgba(61,158,255,.4);
  transition: all .18s; position: relative; overflow: hidden;
  animation: fadeUp .4s ease .4s both;
}
.scan-btn-big::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.15), transparent);
  opacity: 0; transition: opacity .15s;
}
.scan-btn-big:active { transform: scale(.96); box-shadow: 0 4px 16px rgba(61,158,255,.3); }
.scan-btn-big:active::before { opacity: 1; }

.pulse-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: #fff; flex-shrink: 0;
  box-shadow: 0 0 0 0 rgba(255,255,255,.5);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,.5); }
  50% { box-shadow: 0 0 0 8px rgba(255,255,255,.0); }
}

.manual-btn {
  margin-top: .75rem; width: 100%; max-width: 320px;
  padding: 15px 24px; border-radius: 16px;
  border: 1px solid var(--border2); background: var(--surface2);
  color: var(--text2); font-size: 14px; font-weight: 600;
  font-family: var(--sans); cursor: pointer;
  transition: all .15s;
  animation: fadeUp .4s ease .5s both;
}
.manual-btn:active { background: var(--card); color: var(--text1); }

/* Recent scans */
.recent-wrap {
  width: 100%; max-width: 360px; margin-top: 2rem;
  animation: fadeUp .4s ease .6s both;
}
.recent-title {
  font-size: 11px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: .8px; margin-bottom: .75rem;
}
.recent-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 12px;
  margin-bottom: 8px; cursor: pointer; transition: all .15s;
}
.recent-item:active { background: var(--surface2); }
.recent-icon {
  width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
  background: rgba(61,158,255,.12); display: flex; align-items: center;
  justify-content: center; font-size: 16px;
}
.recent-name { font-size: 13px; font-weight: 600; color: var(--text1); }
.recent-code { font-size: 11px; color: var(--text2); font-family: var(--mono); margin-top: 1px; }
.recent-time { font-size: 10px; color: var(--text3); margin-left: auto; flex-shrink: 0; }

/* ─── SCANNER SCREEN ─── */
#scanner {
  background: #000;
  position: relative;
}
#scanner.active { display: flex; }

.scanner-video-wrap {
  flex: 1; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}

#video {
  width: 100%; height: 100%; object-fit: cover;
  position: absolute; inset: 0;
}

/* Overlay dimming */
.scan-overlay {
  position: absolute; inset: 0; pointer-events: none;
}
/* 4 dark corners, center is clear */
.scan-overlay::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 220px 180px at 50% 50%,
      transparent 0%, transparent 55%, rgba(0,0,0,.55) 100%);
}

/* Scan frame */
.scan-frame {
  position: absolute;
  width: 260px; height: 180px;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
.corner {
  position: absolute; width: 28px; height: 28px;
  border-color: var(--teal); border-style: solid;
}
.corner-tl { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
.corner-tr { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 6px 0 0; }
.corner-bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 6px; }
.corner-br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }

/* Scan laser line */
.scan-laser {
  position: absolute; left: 4px; right: 4px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--teal), transparent);
  box-shadow: 0 0 12px 2px var(--teal-glow);
  animation: laserScan 2s ease-in-out infinite;
}
@keyframes laserScan {
  0% { top: 4px; opacity: 1; }
  48% { top: calc(100% - 6px); opacity: 1; }
  50% { top: calc(100% - 6px); opacity: 0; }
  52% { top: 4px; opacity: 0; }
  54% { top: 4px; opacity: 1; }
  100% { top: 4px; opacity: 1; }
}

/* Frame glow when scanning */
.scan-frame.scanning .corner { border-color: var(--green); }
.scan-frame.scanning .scan-laser {
  background: linear-gradient(90deg, transparent, var(--green), transparent);
  box-shadow: 0 0 16px 4px var(--green-glow);
  animation: none; top: 50%;
}

/* Scanner top bar */
.scanner-topbar {
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  padding: calc(env(safe-area-inset-top) + .75rem) 1rem .75rem;
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(to bottom, rgba(0,0,0,.6), transparent);
}
.scanner-title { font-size: 15px; font-weight: 700; color: #fff; }
.close-btn {
  padding: 8px 16px; border-radius: 10px;
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.15);
  color: #fff; font-size: 13px; font-weight: 700;
  cursor: pointer; font-family: var(--sans);
}

/* Scanner hint */
.scan-hint {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 1.5rem 1.5rem calc(env(safe-area-inset-bottom) + 1.5rem);
  background: linear-gradient(to top, rgba(0,0,0,.75), transparent);
  text-align: center; pointer-events: none;
}
.scan-hint-text {
  font-size: 13px; color: rgba(255,255,255,.7); font-weight: 500;
}
.scan-status {
  font-size: 12px; color: var(--teal); font-weight: 700;
  margin-top: 4px; font-family: var(--mono); min-height: 18px;
}

/* Torch / flip button */
.scanner-controls {
  position: absolute; right: 1rem; top: 50%;
  transform: translateY(-50%); z-index: 10;
  display: flex; flex-direction: column; gap: 10px;
}
.ctrl-btn {
  width: 42px; height: 42px; border-radius: 12px;
  background: rgba(0,0,0,.5); border: 1px solid rgba(255,255,255,.15);
  color: #fff; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.ctrl-btn:active { background: rgba(255,255,255,.15); }
.ctrl-btn.active { background: rgba(255,200,0,.2); border-color: rgba(255,200,0,.4); }

/* ─── RESULT SCREEN ─── */
#result {
  padding: calc(env(safe-area-inset-top) + 1rem) 1rem calc(env(safe-area-inset-bottom) + 1.5rem);
  overflow-y: auto;
  animation: screenIn .3s cubic-bezier(.34,1.2,.64,1);
}

.result-topbar {
  display: flex; align-items: center; gap: 10px; margin-bottom: 1.25rem;
}
.back-btn {
  width: 40px; height: 40px; border-radius: 12px;
  background: var(--surface2); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 20px; color: var(--text1); flex-shrink: 0;
  transition: all .15s;
}
.back-btn:active { background: var(--card); }
.result-topbar-title { font-size: 16px; font-weight: 700; }

/* Scanned barcode display */
.barcode-display {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 18px; padding: 16px 18px; margin-bottom: 14px;
  position: relative; overflow: hidden;
}
.barcode-display::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--teal), var(--blue));
}
.bc-label { font-size: 10px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
.bc-value {
  font-family: var(--mono); font-size: 22px; font-weight: 600;
  color: var(--teal); letter-spacing: 2px; word-break: break-all;
}
.bc-type-chip {
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: 8px; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700;
  background: rgba(61,158,255,.12); color: var(--blue);
}

/* Drug card */
.drug-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; overflow: hidden; margin-bottom: 12px;
}
.drug-card-header {
  background: linear-gradient(135deg, #0F2744, #152E50);
  padding: 18px; border-bottom: 1px solid var(--border);
}
.drug-card-icon {
  width: 42px; height: 42px; border-radius: 12px;
  background: rgba(61,158,255,.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; margin-bottom: 10px;
}
.drug-card-name {
  font-size: 16px; font-weight: 700; line-height: 1.3;
  color: var(--text1); margin-bottom: 4px;
}
.drug-card-code {
  font-family: var(--mono); font-size: 12px; color: var(--blue);
  font-weight: 600;
}

.drug-info-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
  background: var(--border);
}
.drug-info-cell {
  background: var(--surface); padding: 14px 16px;
}
.dic-label { font-size: 10px; color: var(--text3); font-weight: 700;
  text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
.dic-val { font-size: 14px; font-weight: 700; color: var(--text1); }
.dic-val.green { color: var(--green); }
.dic-val.amber { color: var(--amber); }
.dic-val.red { color: var(--red); }

/* Not found card */
.notfound-card {
  background: var(--surface); border: 1px solid rgba(255,90,90,.15);
  border-radius: 20px; padding: 24px; text-align: center; margin-bottom: 12px;
}
.nf-icon { font-size: 40px; margin-bottom: 12px; }
.nf-title { font-size: 16px; font-weight: 700; color: var(--red); margin-bottom: 6px; }
.nf-sub { font-size: 13px; color: var(--text2); line-height: 1.6; }

/* GS1 parsed info */
.gs1-card {
  background: var(--surface2); border: 1px solid rgba(0,229,196,.12);
  border-radius: 16px; padding: 14px 16px; margin-bottom: 12px;
}
.gs1-title {
  font-size: 11px; font-weight: 700; color: var(--teal);
  text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.gs1-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 0; border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.gs1-row:last-child { border-bottom: none; }
.gs1-key { color: var(--text2); font-weight: 600; }
.gs1-val { font-family: var(--mono); font-weight: 600; color: var(--text1); }

/* Action buttons */
.action-row { display: flex; gap: 10px; margin-top: .5rem; }
.action-btn {
  flex: 1; padding: 15px; border-radius: 14px; border: none;
  font-size: 14px; font-weight: 700; cursor: pointer;
  font-family: var(--sans); transition: all .15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.action-btn:active { transform: scale(.97); }
.btn-receive {
  background: linear-gradient(135deg, #0B9E72, #077A58);
  color: #fff;
  box-shadow: 0 4px 20px rgba(11,158,114,.35);
}
.btn-dispense {
  background: linear-gradient(135deg, #C0392B, #992D22);
  color: #fff;
  box-shadow: 0 4px 20px rgba(192,57,43,.35);
}
.btn-scan-again {
  background: var(--surface2); color: var(--text1);
  border: 1px solid var(--border2);
}

/* Manual input */
.manual-wrap {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 16px; padding: 1rem; margin-bottom: 12px;
}
.manual-label {
  font-size: 11px; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: .6px; margin-bottom: 8px;
}
.manual-input-row { display: flex; gap: 8px; }
.manual-input {
  flex: 1; background: var(--bg); border: 1px solid var(--border2);
  border-radius: 10px; padding: 12px 14px;
  font-size: 15px; color: var(--text1); font-family: var(--sans);
  transition: border-color .15s;
}
.manual-input:focus { outline: none; border-color: var(--blue); }
.manual-input::placeholder { color: var(--text3); }
.manual-go-btn {
  padding: 12px 18px; border-radius: 10px; border: none;
  background: var(--blue); color: #fff; font-size: 14px;
  font-weight: 700; cursor: pointer; font-family: var(--sans);
  white-space: nowrap;
}

/* ─── TOAST ─── */
.toast {
  position: fixed; bottom: calc(env(safe-area-inset-bottom) + 20px);
  left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 12px; padding: 12px 20px;
  font-size: 13px; font-weight: 700; color: var(--text1);
  box-shadow: 0 8px 40px rgba(0,0,0,.5);
  z-index: 999; display: none; white-space: nowrap;
  animation: toastPop .25s cubic-bezier(.34,1.4,.64,1);
}
@keyframes toastPop { from { opacity:0; transform:translateX(-50%) translateY(16px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }

/* ─── SUCCESS FLASH ─── */
.success-flash {
  position: fixed; inset: 0; background: rgba(34,212,122,.15);
  pointer-events: none; z-index: 999; opacity: 0;
  transition: opacity .15s;
}
.success-flash.show { opacity: 1; }
</style>
</head>
<body>

<!-- Success flash overlay -->
<div class="success-flash" id="flash"></div>
<div class="toast" id="toast"></div>

<!-- ══ HOME ══════════════════════════════════════════════════ -->
<div class="screen active" id="home">
  <div class="home-logo">💊</div>
  <div class="home-title">สแกนบาร์โค้ดยา</div>
  <div class="home-sub">PCU สะบ้าย้อย<br>รองรับ EAN-13, Code 128, QR, GS1-128</div>

  <button class="scan-btn-big" onclick="startScanner()">
    <span class="pulse-dot"></span>
    เปิดกล้องสแกน
  </button>

  <button class="manual-btn" onclick="showManualInput()">
    ⌨ กรอกรหัสเอง
  </button>

  <div class="recent-wrap" id="recent-wrap" style="display:none;">
    <div class="recent-title">สแกนล่าสุด</div>
    <div id="recent-list"></div>
  </div>
</div>

<!-- ══ SCANNER ══════════════════════════════════════════════ -->
<div class="screen" id="scanner">
  <div class="scanner-video-wrap">
    <video id="video" autoplay playsinline muted></video>
    <div class="scan-overlay"></div>
    <div class="scan-frame" id="scan-frame">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>
      <div class="scan-laser"></div>
    </div>
    <div class="scanner-topbar">
      <span class="scanner-title">🔍 สแกนบาร์โค้ด</span>
      <button class="close-btn" onclick="stopScanner()">✕ ปิด</button>
    </div>
    <div class="scanner-controls">
      <button class="ctrl-btn" id="torch-btn" onclick="toggleTorch()" title="ไฟฉาย">🔦</button>
      <button class="ctrl-btn" id="flip-btn" onclick="flipCamera()" title="กลับกล้อง">🔄</button>
    </div>
    <div class="scan-hint">
      <div class="scan-hint-text">จัดบาร์โค้ดให้อยู่ในกรอบ — สแกนอัตโนมัติ</div>
      <div class="scan-status" id="scan-status">กำลังเปิดกล้อง...</div>
    </div>
  </div>
</div>

<!-- ══ RESULT ══════════════════════════════════════════════ -->
<div class="screen" id="result">
  <div class="result-topbar">
    <button class="back-btn" onclick="goHome()">‹</button>
    <span class="result-topbar-title">ผลการสแกน</span>
  </div>
  <div id="result-content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script>
// ── Drug Database (PCU สะบ้าย้อย)
const drugDB = [

  ["110104480112","FOLIC ACID 5MG./TAB","เม็ด","Supplement"],
  ["1419041","GEMfibrozil 300 MG./CAP","แคปซูล","Lipid-lowering"],
  ["1440105","AMLODIPINE 5 MG./TAB","เม็ด","Antihypertensive"],
  ["1460151","ENALAPRIL 20 MG./TAB","เม็ด","Antihypertensive"],
  ["1500016","Metoprolol 100 MG./TAB","เม็ด","Antihypertensive"],
  ["1500035","METOCLOPRAMIDE 10 mg TAB","เม็ด","GI"],
  ["1530008","ASPIRIN 81 MG./TAB","เม็ด","Antiplatelet"],
  ["1ALB","ALBENDAZOLE 200 MG./TAB","เม็ด","Antiparasitic"],
  ["1AMIT","AMITRIPTYLINE 10 MG./TAB","เม็ด","Psychotropic"],
  ["1AMO","AMOXICILLIN 500 MG./CAP","แคปซูล","Antibiotic"],
  ["1AMX","Amoxicillin 250 mg./cap","แคปซูล","Antibiotic"],
  ["1BUF","IBUPROFEN 400 MG./TAB","เม็ด","NSAID"],

  ["1DCL","DICLOXACILLIN 250 MG./CAP","แคปซูล","Antibiotic"],
  ["1DEXT","DEXTROMETHORPHANE","เม็ด","Antitussive"],
  ["1DIC","DICLOFENAC SODIUM 25 MG./TAB","เม็ด","NSAID"],

// GS1 Application Identifiers
function parseGS1(raw) {
  const r = {};
  let s = raw.replace(/[\u001d\u00f1]/g, '|').replace(/\(/g, '').replace(/\)/g, '~');
  const extractFixed = (ai, len) => {
    const rx = new RegExp(`${ai}~?(\\d{${len}})`);
    const m = s.match(rx); return m ? m[1] : null;
  };
  const extractVar = (ai) => {
    const rx = new RegExp(`${ai}~?([^|~\\d]?[^|~]{0,30}?)(?=[0-9]{2}~|\\||$)`);
    // simpler: grab after AI until separator
    const idx = s.indexOf(ai + '~');
    if (idx >= 0) {
      const after = s.substring(idx + ai.length + 1);
      return after.split(/[|~]/)[0].trim() || null;
    }
    return null;
  };
  const gtin = extractFixed('01', 14);
  if (gtin) r.gtin = gtin;
  const exp = extractFixed('17', 6);
  if (exp) {
    const yy = exp.slice(0,2), mm = exp.slice(2,4), dd = exp.slice(4,6);
    const yr = parseInt(yy) > 50 ? '19'+yy : '20'+yy;
    const d = dd === '00' ? '28' : dd;
    r.expDisplay = `${d}/${mm}/${yr}`;
    r.expInput = `${yr}-${mm}-${d}`;
  }
  const lot = extractVar('10');
  if (lot && lot.length > 0) r.lot = lot;
  const qty = extractFixed('37', 6);
  if (qty) r.qty = parseInt(qty);
  return Object.keys(r).length > 0 ? r : null;
}

function detectBarcodeType(val) {
  if (/^\d{13}$/.test(val)) return 'EAN-13';
  if (/^\d{12}$/.test(val)) return 'UPC-A';
  if (/^\d{8}$/.test(val)) return 'EAN-8';
  if (val.includes('01') && (val.includes('17') || val.includes('10'))) return 'GS1-128';
  if (/^https?:\/\//.test(val)) return 'QR Code (URL)';
  return 'Code 128 / QR';
}

function lookupDrug(val) {
  // ค้นหาจาก code ตรง
  let found = drugDB.find(d => d[0].toLowerCase() === val.toLowerCase());
  if (found) return found;
  // EAN-13 → ลอง match จาก code ที่ฝังใน barcode
  if (/^\d{13}$/.test(val)) {
    // บางระบบฝัง PCU code ท้าย EAN
    for (const d of drugDB) {
      if (val.endsWith(d[0]) || val.includes(d[0])) return d;
    }
  }
  // GS1 → ดึง GTIN แล้วค้น
  const gs1 = parseGS1(val);
  if (gs1 && gs1.gtin) {
    found = drugDB.find(d => d[0] === gs1.gtin || gs1.gtin.endsWith(d[0]));
    if (found) return found;
  }
  // ค้นด้วย substring ของชื่อ
  const q = val.toLowerCase();
  found = drugDB.find(d => d[1].toLowerCase().includes(q) || d[0].toLowerCase().includes(q));
  return found || null;
}

// ── State
let stream = null;
let scanInterval = null;
let lastScanned = '';
let torchOn = false;
let facingMode = 'environment';
let recentScans = JSON.parse(localStorage.getItem('recent_scans') || '[]');
let scanCanvas, scanCtx;

// ── Screen management
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  stopScanner();
  showScreen('home');
  renderRecent();
}

// ── Home
function renderRecent() {
  const wrap = document.getElementById('recent-wrap');
  const list = document.getElementById('recent-list');
  if (!recentScans.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  list.innerHTML = recentScans.slice(0, 5).map(s => {
    const icon = CAT_ICON[s.category] || '💊';
    return `<div class="recent-item" onclick="showResultFromRecent('${s.barcode.replace(/'/g,"\\'")}')">
      <div class="recent-icon">${icon}</div>
      <div style="flex:1;min-width:0;">
        <div class="recent-name">${s.name || s.barcode}</div>
        <div class="recent-code">${s.barcode}</div>
      </div>
      <div class="recent-time">${s.time}</div>
    </div>`;
  }).join('');
}

function showManualInput() {
  showScreen('result');
  document.getElementById('result-content').innerHTML = `
    <div class="manual-wrap">
      <div class="manual-label">กรอกรหัสหรือชื่อยาด้วยตัวเอง</div>
      <div class="manual-input-row">
        <input class="manual-input" id="manual-val" placeholder="รหัสยา / ชื่อยา / EAN-13..."
          autofocus inputmode="text">
        <button class="manual-go-btn" onclick="doManualLookup()">ค้นหา</button>
      </div>
    </div>
    <div id="manual-result"></div>`;
  setTimeout(() => document.getElementById('manual-val')?.focus(), 200);
}

function doManualLookup() {
  const val = document.getElementById('manual-val')?.value.trim();
  if (!val) return;
  renderResult(val, document.getElementById('manual-result'));
}

function showResultFromRecent(barcode) {
  showScreen('result');
  document.getElementById('result-content').innerHTML = '';
  renderResult(barcode, document.getElementById('result-content'));
}

// ── Scanner
async function startScanner() {
  showScreen('scanner');
  lastScanned = '';
  document.getElementById('scan-status').textContent = 'กำลังเปิดกล้อง...';
  try {
    if (stream) { stream.getTracks().forEach(t => t.stop()); }
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode,
        width: { ideal: 1280 },
        height: { ideal: 720 },
        focusMode: 'continuous',
      }
    });
    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();
    scanCanvas = document.createElement('canvas');
    scanCtx = scanCanvas.getContext('2d');
    document.getElementById('scan-status').textContent = 'พร้อมสแกน — จัดบาร์โค้ดให้อยู่ในกรอบ';
    startScanLoop();
  } catch (e) {
    document.getElementById('scan-status').textContent = 'ไม่สามารถเปิดกล้องได้: ' + e.message;
  }
}

function startScanLoop() {
  clearInterval(scanInterval);
  const video = document.getElementById('video');
  scanInterval = setInterval(() => {
    if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
    scanCanvas.width = video.videoWidth;
    scanCanvas.height = video.videoHeight;
    scanCtx.drawImage(video, 0, 0);
    const img = scanCtx.getImageData(0, 0, scanCanvas.width, scanCanvas.height);
    const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'dontInvert' });
    if (code && code.data && code.data !== lastScanned) {
      lastScanned = code.data;
      onCodeFound(code.data);
    }
  }, 150);
}

function onCodeFound(val) {
  clearInterval(scanInterval);
  // flash frame green
  const frame = document.getElementById('scan-frame');
  frame.classList.add('scanning');
  document.getElementById('scan-status').textContent = '✓ สแกนได้: ' + val;

  // vibrate
  if (navigator.vibrate) navigator.vibrate([60, 30, 60]);

  // success flash
  const flash = document.getElementById('flash');
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 300);

  setTimeout(() => {
    stopScanner();
    showScreen('result');
    document.getElementById('result-content').innerHTML = '';
    renderResult(val, document.getElementById('result-content'));
  }, 600);
}

function stopScanner() {
  clearInterval(scanInterval);
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  const video = document.getElementById('video');
  if (video) video.srcObject = null;
  document.getElementById('scan-frame').classList.remove('scanning');
  torchOn = false;
  document.getElementById('torch-btn').classList.remove('active');
}

async function toggleTorch() {
  if (!stream) return;
  try {
    const track = stream.getVideoTracks()[0];
    await track.applyConstraints({ advanced: [{ torch: !torchOn }] });
    torchOn = !torchOn;
    document.getElementById('torch-btn').classList.toggle('active', torchOn);
  } catch (e) {
    toast('กล้องนี้ไม่รองรับไฟฉาย');
  }
}

async function flipCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  await startScanner();
}

// ── Result rendering
function renderResult(val, container) {
  const type = detectBarcodeType(val);
  const gs1 = parseGS1(val);
  const drug = lookupDrug(val);

  // Save to recent
  addRecent(val, drug);

  let html = '';

  // Barcode display
  html += `<div class="barcode-display">
    <div class="bc-label">บาร์โค้ดที่สแกน</div>
    <div class="bc-value">${val.length > 30 ? val.substring(0,30)+'…' : val}</div>
    <div class="bc-type-chip">📊 ${type}</div>
  </div>`;

  // GS1 parsed data
  if (gs1 && (gs1.lot || gs1.expDisplay || gs1.qty)) {
    html += `<div class="gs1-card">
      <div class="gs1-title">
        <span>⚡</span> ข้อมูล GS1 (แปลอัตโนมัติ)
      </div>
      ${gs1.gtin ? `<div class="gs1-row"><span class="gs1-key">GTIN (01)</span><span class="gs1-val">${gs1.gtin}</span></div>` : ''}
      ${gs1.lot ? `<div class="gs1-row"><span class="gs1-key">LOT (10)</span><span class="gs1-val">${gs1.lot}</span></div>` : ''}
      ${gs1.expDisplay ? `<div class="gs1-row"><span class="gs1-key">หมดอายุ (17)</span><span class="gs1-val" style="color:var(--amber)">${gs1.expDisplay}</span></div>` : ''}
      ${gs1.qty ? `<div class="gs1-row"><span class="gs1-key">จำนวน (37)</span><span class="gs1-val">${gs1.qty}</span></div>` : ''}
    </div>`;
  }

  // Drug info
  if (drug) {
    const icon = CAT_ICON[drug[3]] || '💊';
    const formColor = ['เม็ด','แคปซูล'].includes(drug[2]) ? 'green' :
                      ['ยาฉีด','วัคซีน'].includes(drug[2]) ? 'amber' : 'green';
    html += `<div class="drug-card">
      <div class="drug-card-header">
        <div class="drug-card-icon">${icon}</div>
        <div class="drug-card-name">${drug[1]}</div>
        <div class="drug-card-code">รหัส PCU: ${drug[0]}</div>
      </div>
      <div class="drug-info-grid">
        <div class="drug-info-cell">
          <div class="dic-label">รูปแบบยา</div>
          <div class="dic-val ${formColor}">${drug[2]}</div>
        </div>
        <div class="drug-info-cell">
          <div class="dic-label">กลุ่มยา</div>
          <div class="dic-val">${drug[3]}</div>
        </div>
        ${gs1 && gs1.expDisplay ? `
        <div class="drug-info-cell">
          <div class="dic-label">วันหมดอายุ</div>
          <div class="dic-val amber">${gs1.expDisplay}</div>
        </div>` : ''}
        ${gs1 && gs1.lot ? `
        <div class="drug-info-cell">
          <div class="dic-label">LOT</div>
          <div class="dic-val" style="font-family:var(--mono);font-size:13px;">${gs1.lot}</div>
        </div>` : ''}
      </div>
    </div>`;

    // Actions
    html += `<div class="action-row">
      <button class="action-btn btn-receive" onclick="useInSystem('receive','${drug[0].replace(/'/g,"\\'")}','${drug[1].replace(/'/g,"\\'")}')">
        📥 รับยาเข้า
      </button>
      <button class="action-btn btn-dispense" onclick="useInSystem('dispense','${drug[0].replace(/'/g,"\\'")}','${drug[1].replace(/'/g,"\\'")}')">
        📤 เบิกยา
      </button>
    </div>`;
  } else {
    html += `<div class="notfound-card">
      <div class="nf-icon">🔍</div>
      <div class="nf-title">ไม่พบยาในฐานข้อมูล PCU</div>
      <div class="nf-sub">รหัส "${val}" ยังไม่มีในระบบ<br>สามารถเพิ่มยาใหม่ได้ในหน้าจัดการฐานข้อมูล</div>
    </div>`;
  }

  // Scan again
  html += `<button class="action-btn btn-scan-again" style="width:100%;margin-top:4px;" onclick="startScanner()">
    🔍 สแกนใหม่
  </button>`;

  container.innerHTML = html;
}

function useInSystem(action, code, name) {
  toast(action === 'receive'
    ? `📥 เลือก "${name}" สำหรับรับยาเข้า`
    : `📤 เลือก "${name}" สำหรับเบิกยา`);
  // ตรงนี้ต่อเชื่อมกับระบบหลักได้ เช่น:
  // window.parent.postMessage({ action, code, name }, '*');
  // หรือ window.location.href = 'main.html?action='+action+'&code='+code;
}

function addRecent(barcode, drug) {
  const now = new Date();
  const time = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  const entry = {
    barcode,
    name: drug ? drug[1] : barcode,
    category: drug ? drug[3] : '',
    time,
  };
  recentScans = recentScans.filter(r => r.barcode !== barcode);
  recentScans.unshift(entry);
  if (recentScans.length > 20) recentScans = recentScans.slice(0, 20);
  localStorage.setItem('recent_scans', JSON.stringify(recentScans));
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.display = 'none', 3000);
}

// Init
renderRecent();
